# P5 Phase 5 (patch 0.75) — deploy the Vite build to GitHub Pages.
#
# ✅ เปิดใช้แล้ว (patch 0.76): Pages source = "GitHub Actions", deploy อัตโนมัติทุก push main.
# ประวัติ: 0.75 สร้างแบบ workflow_dispatch (manual) ก่อน → test ผ่าน (live เสิร์ฟ Vite build, asset ครบ, console สะอาด)
#   → 0.76 เปิด push trigger. legacy branch deploy ถูกแทนแล้ว. สลับกลับได้ที่ Settings → Pages → Source.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]      # auto-deploy ทุก push main (รวม data update รายชั่วโมงจาก update-market-radar.yml → live data สด)
  workflow_dispatch: {}

permissions:
  contents: read          # checkout
  pages: write            # deploy-pages
  id-token: write         # deploy-pages (OIDC)

# deploy ทีละครั้ง ไม่ยกเลิกตัวที่กำลังรัน
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (Vite → dist/, copies js/data/image/background/assets)
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
